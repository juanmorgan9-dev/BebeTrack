<body>
<div id="app"></div>
<div id="toast"></div>
<div id="pull-bar">Actualizando...</div>
<div id="sync-badge">En vivo</div>
<script>
const BABIES=[
  {id:"santi",name:"Santi",color:"#4FC3F7",emoji:"🐻"},
  {id:"jero", name:"Jero", color:"#81C784",emoji:"🐯"},
];
const EVT={
  feed:      {label:"Alimento",  icon:"🍼",color:"#4FC3F7"},
  pee:       {label:"Pis",       icon:"💧",color:"#FFF176"},
  poop:      {label:"Popó",      icon:"💩",color:"#FFCC80"},
  bath:      {label:"Baño",      icon:"🛁",color:"#CE93D8"},
  extraction:{label:"Extracción",icon:"🥛",color:"#F48FB1"},
  other:     {label:"Otro",      icon:"📝",color:"#90A4AE"},
};
const FEED_SUBS=[
  {id:"breast", label:"Teta"},
  {id:"pumped", label:"Leche extraída"},
  {id:"formula",label:"Fórmula"},
  {id:"solid",  label:"Sólido"},
];
const OTHER_SUBS=[
  {id:"weighing",label:"Pesada",    icon:"⚖️"},
  {id:"illness", label:"Enfermedad",icon:"🤒"},
  {id:"generic", label:"Nota",      icon:"📌"},
];
const LOG_TYPES=[
  {id:"all",       label:"Todos"},
  {id:"feed",      label:"🍼 Alimento"},
  {id:"pee",       label:"💧 Pis"},
  {id:"poop",      label:"💩 Popó"},
  {id:"bath",      label:"🛁 Baño"},
  {id:"extraction",label:"🥛 Extracción"},
  {id:"other",     label:"📝 Otro"},
];
const POOP_CONS=["Líquida","Blanda","Firme","Dura"];
const POOP_COL =["Amarillo","Verde","Marrón","Negro","Rojo"];
const BREAST_DUR=[5,10,15,20,25];
const ML_OPTS   =[50,100,150,170,200];
const LS_KEY    ="bebetrack_v8";
const RANGES    =[{id:"24h",label:"24 hs"},{id:"7d",label:"7 días"},{id:"30d",label:"Mes"},{id:"all",label:"Total"}];

function specialDayBanner(){
  const now=new Date(),m=now.getMonth()+1,d=now.getDate();
  const wrap=(color,emoji,title,sub)=>`<div style="background:${color}22;border:1px solid ${color}55;border-radius:14px;padding:14px 16px;margin-bottom:14px;text-align:center"><div style="font-size:26px;margin-bottom:4px">${emoji}</div><div style="font-size:14px;font-weight:900;color:${color}">${title}</div>${sub?`<div style="font-size:12px;color:#aaa;margin-top:4px">${sub}</div>`:""}</div>`;
  if(m===9&&d===11) return wrap("#FFD700","🎂","¡Feliz cumple a Santi y Jero!","");
  if(m===9&&d===30) return wrap("#81C784","✝️","Hoy es el día de San Jerónimo","Hoy la Iglesia reza por Jero, para que sea Santo!");
  if(m===7&&d===25) return wrap("#4FC3F7","✝️","Hoy es el día de Santiago Apóstol","Hoy la Iglesia reza por Santi, para que sea Santo!");
  if(m===11&&d===11)return wrap("#CE93D8","✝️","Hoy es el día de San Martín de Tours","Hoy la Iglesia reza por Martín, para que siga siendo un gran padre!");
  if(m===12&&d===1) return wrap("#F48FB1","✝️","Hoy es el día de Santa Florencia","Hoy la Iglesia reza por la floreda, para que siga siendo una gran madre!");
  return"";
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let S={events:[],activeTab:"home",modal:null,filterBaby:"all",filterType:"all",confirmDel:null,detailId:null,statsRange:"7d",fbReady:false};
let MS={},ME={};

// ── SUPABASE HELPERS ─────────────────────────────────────────────────────────
function mapFromDb(row){return{id:row.id,dateTime:row.date_time,type:row.type,babyId:row.baby_id||undefined,subtype:row.subtype||undefined,otherSubtype:row.other_subtype||undefined,ml:row.ml||undefined,durationMin:row.duration_min||undefined,consistency:row.consistency||undefined,poopColor:row.poop_color||undefined,notes:row.notes||undefined};}
function mapToDb(ev){return{id:ev.id,baby_id:ev.babyId||null,type:ev.type,subtype:ev.subtype||null,other_subtype:ev.otherSubtype||null,date_time:ev.dateTime,duration_min:ev.durationMin||null,ml:ev.ml||null,consistency:ev.consistency||null,poop_color:ev.poopColor||null,notes:ev.notes||null};}

const byDate=(a,b)=>new Date(b.dateTime)-new Date(a.dateTime);

async function fetchAllEvents(){
  const{data,error}=await _sb.from("events").select("*").order("date_time",{ascending:false});
  if(error){console.error("Supabase fetch error:",error);return;}
  S.events=(data||[]).map(mapFromDb);S.fbReady=true;badge("live");render();
}

async function addEvent(ev){
  S.events=[ev,...S.events].sort(byDate);render();badge("syncing");
  const row=mapToDb(ev);
  const{error}=await _sb.from("events").insert([row]);
  if(error){console.error("Insert error:",error);showToast("❌ Error al guardar");}
}

async function deleteEvent(id){
  S.events=S.events.filter(e=>e.id!==id);render();badge("syncing");
  const{error}=await _sb.from("events").delete().eq("id",id);
  if(error){console.error("Delete error:",error);showToast("❌ Error al borrar");}
}

// ── REALTIME ─────────────────────────────────────────────────────────────────
_sb.channel("events-realtime").on("postgres_changes",{event:"*",schema:"public",table:"events"},()=>{fetchAllEvents();}).subscribe();

function badge(s){
  const el=document.getElementById("sync-badge");if(!el)return;
  el.className=s;
  if(s==="live")el.textContent="🟢 En vivo";
  if(s==="syncing"){el.textContent="🔄 Guardando...";setTimeout(()=>badge("live"),1800);}
}
function doRefresh(){
  const pb=document.getElementById("pull-bar");
  if(pb){pb.classList.add("show");setTimeout(()=>pb.classList.remove("show"),1200);}
  fetchAllEvents();showToast("🔄 Actualizado");
}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")fetchAllEvents();});
let ptY=0;
document.addEventListener("touchstart",e=>{ptY=e.touches[0].clientY;},{passive:true});
document.addEventListener("touchend",e=>{if(e.changedTouches[0].clientY-ptY>80&&window.scrollY===0&&!S.modal)doRefresh();},{passive:true});

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtTime(iso){return new Date(iso).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});}
function fmtDate(iso){
  const d=new Date(iso),t=new Date();t.setHours(0,0,0,0);
  const df=Math.floor((t-new Date(new Date(iso).toDateString()))/864e5);
  if(df===0)return"Hoy";if(df===1)return"Ayer";
  return d.toLocaleDateString("es-AR",{day:"numeric",month:"short"});
}
function ago(iso){
  const m=Math.round((Date.now()-new Date(iso))/6e4);
  if(m<1)return"Ahora";if(m<60)return`Hace ${m} min`;
  const h=Math.floor(m/60),r=m%60;return r?`Hace ${h}h ${r}m`:`Hace ${h}h`;
}
function nowInput(){
  const d=new Date(),p=n=>String(n).padStart(2,"0");
  return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function toInput(iso){const d=new Date(iso),p=n=>String(n).padStart(2,"0");return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function rangeStart(r){
  if(r==="all")return new Date(0);if(r==="24h")return new Date(Date.now()-864e5);
  const d=new Date();d.setDate(d.getDate()-(r==="7d"?7:30));d.setHours(0,0,0,0);return d;
}
function lastRegStr(lu){
  if(!lu)return"";
  const mins=Math.round((Date.now()-new Date(lu))/6e4);
  let rel;if(mins<1)rel="hace menos de 1 min";else if(mins<60)rel=`hace ${mins} min`;else{const h=Math.floor(mins/60),r=mins%60;rel=r?`hace ${h}h ${r}m`:`hace ${h}h`;}
  return`Último registro ${rel} (${fmtTime(lu)})`;
}
function timeStr(h){
  if(h===null)return"—";
  if(h<1){const m=Math.round(h*60);return`hace ${m} min`;}
  if(h<24)return`hace ${Math.floor(h)}h`;
  const d=Math.floor(h/24);return`hace ${d} día${d!==1?"s":""}`;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function stats24h(events,babyId){
  const since=new Date(Date.now()-864e5);
  const evs=events.filter(e=>e.babyId===babyId&&new Date(e.dateTime)>=since);
  const feeds=evs.filter(e=>e.type==="feed");
  const lf=[...events.filter(e=>e.babyId===babyId&&e.type==="feed")].sort(byDate)[0]||null;
  const lp=[...events.filter(e=>e.babyId===babyId&&e.type==="poop")].sort(byDate)[0]||null;
  const lb=[...events.filter(e=>e.babyId===babyId&&e.type==="bath")].sort(byDate)[0]||null;
  return{
    feeds:feeds.length,totalMl:feeds.reduce((a,e)=>a+(e.ml||0),0),
    pees:evs.filter(e=>e.type==="pee").length,
    poops:evs.filter(e=>e.type==="poop").length,
    lastFeedH:lf?(Date.now()-new Date(lf.dateTime))/36e5:null,
    lastPoopH:lp?(Date.now()-new Date(lp.dateTime))/36e5:null,
    lastPoopDays:lp?Math.floor((Date.now()-new Date(lp.dateTime))/864e5):null,
    lastPoopDate:lp?new Date(lp.dateTime):null,
    lastBathH:lb?(Date.now()-new Date(lb.dateTime))/36e5:null,
  };
}
function statsRange(events,babyId,r){
  const since=rangeStart(r);
  const evs=events.filter(e=>e.babyId===babyId&&new Date(e.dateTime)>=since);
  const br=evs.filter(e=>e.type==="feed"&&e.subtype==="breast");
  const pu=evs.filter(e=>e.type==="feed"&&e.subtype==="pumped");
  const fo=evs.filter(e=>e.type==="feed"&&e.subtype==="formula");
  const so=evs.filter(e=>e.type==="feed"&&e.subtype==="solid");
  return{
    baths:evs.filter(e=>e.type==="bath").length,
    pees:evs.filter(e=>e.type==="pee").length,
    poops:evs.filter(e=>e.type==="poop").length,
    breast:{count:br.length,totalMin:br.reduce((a,e)=>a+(e.durationMin||0),0)},
    pumped:{count:pu.length,totalMl:pu.reduce((a,e)=>a+(e.ml||0),0)},
    formula:{count:fo.length,totalMl:fo.reduce((a,e)=>a+(e.ml||0),0)},
    solid:{count:so.length},
    notes:evs.filter(e=>e.notes&&e.notes.trim()).map(e=>e.notes.trim()),
  };
}

// ── COLOR HELPERS ─────────────────────────────────────────────────────────────
function poopCol(h){if(h===null)return{c:"#90A4AE",icon:""};if(h<48)return{c:"#66BB6A",icon:""};if(h<120)return{c:"#FFB74D",icon:""};return{c:"#EF5350",icon:"🚨"};}
function feedCol(h){if(h===null)return{c:"#90A4AE",icon:""};if(h<3)return{c:"#66BB6A",icon:""};if(h<6)return{c:"#FFB74D",icon:""};return{c:"#EF5350",icon:"🚨"};}
function bathCol(h){if(h===null)return{c:"#90A4AE",icon:""};if(h<48)return{c:"#66BB6A",icon:""};if(h<72)return{c:"#FFB74D",icon:""};return{c:"#EF5350",icon:"🚨"};}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastT;
function showToast(m){const el=document.getElementById("toast");if(!el)return;el.textContent=m;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),2800);}
function savedToast(ev){
  const baby=ev.babyId?BABIES.find(b=>b.id===ev.babyId):null;
  const et=EVT[ev.type]||{label:"Registro"};
  let lbl=et.label;
  if(ev.type==="feed"&&ev.subtype)lbl=FEED_SUBS.find(s=>s.id===ev.subtype)?.label||lbl;
  if(ev.type==="other"&&ev.otherSubtype){const o=OTHER_SUBS.find(s=>s.id===ev.otherSubtype);if(o)lbl=o.label;}
  const det=[];if(ev.durationMin)det.push(ev.durationMin+"min");if(ev.ml)det.push(ev.ml+"ml");
  showToast(`✅ Guardado: ${[baby?baby.name:"",lbl,...det].filter(Boolean).join(" · ")}`);
}
function deletedToast(id){
  const ev=S.events.find(e=>e.id===id);if(!ev){showToast("🗑️ Eliminado");return;}
  const baby=ev.babyId?BABIES.find(b=>b.id===ev.babyId):null;
  const et=EVT[ev.type]||{label:"Registro"};
  let lbl=et.label;if(ev.type==="feed"&&ev.subtype)lbl=FEED_SUBS.find(s=>s.id===ev.subtype)?.label||lbl;
  showToast(`🗑️ Eliminado: ${[baby?baby.name:"",lbl].filter(Boolean).join(" · ")}`);
}

// ── NARRATIVE ─────────────────────────────────────────────────────────────────
function buildNarrative(events,rangeId){
  const rLbl={"24h":"las últimas 24 horas","7d":"los últimos 7 días","30d":"el último mes","all":"el período completo"}[rangeId];
  if(!events.length)return{header:`Sin registros en ${rLbl}.`,analyses:BABIES.map(baby=>({baby,prose:"Sin datos aún."}))};
  const rsA=statsRange(events,"santi",rangeId),rsB=statsRange(events,"jero",rangeId);
  const d24A=stats24h(events,"santi"),d24B=stats24h(events,"jero");
  const since=rangeStart(rangeId);
  const totalFA=rsA.breast.count+rsA.pumped.count+rsA.formula.count+rsA.solid.count;
  const totalFB=rsB.breast.count+rsB.pumped.count+rsB.formula.count+rsB.solid.count;
  const hParts=[];
  if(totalFA===0&&totalFB===0)hParts.push(`Sin alimentación registrada en ${rLbl}.`);
  else if(totalFA>totalFB*1.4)hParts.push("Santi tomó bastante más que Jero.");
  else if(totalFB>totalFA*1.4)hParts.push("Jero tomó bastante más que Santi.");
  else hParts.push("Ambos con alimentación similar.");
  if((d24A.lastPoopDays||0)>=5)hParts.push("⚠️ Santi lleva varios días sin popó.");
  if((d24B.lastPoopDays||0)>=5)hParts.push("⚠️ Jero lleva varios días sin popó.");
  if(rsA.baths===0&&rangeId!=="24h")hParts.push("Santi sin baños en el período.");
  if(rsB.baths===0&&rangeId!=="24h")hParts.push("Jero sin baños en el período.");
  if(Math.abs(rsA.pees-rsB.pees)>5&&(rsA.pees>0||rsB.pees>0))hParts.push(`Diferencia en pis: Santi ${rsA.pees}, Jero ${rsB.pees}.`);
  if(d24A.lastFeedH!==null&&d24A.lastFeedH>=4)hParts.push(`Santi no come hace ${Math.round(d24A.lastFeedH)}h.`);
  if(d24B.lastFeedH!==null&&d24B.lastFeedH>=4)hParts.push(`Jero no come hace ${Math.round(d24B.lastFeedH)}h.`);
  const header=hParts.join(" ");
  const analyses=BABIES.map(baby=>{
    const rs=baby.id==="santi"?rsA:rsB;
    const d24=baby.id==="santi"?d24A:d24B;
    const feedEvs=[...events.filter(e=>e.babyId===baby.id&&e.type==="feed"&&new Date(e.dateTime)>=since)].sort((a,b)=>new Date(a.dateTime)-new Date(b.dateTime));
    const sentences=[];
    const totalF=rs.breast.count+rs.pumped.count+rs.formula.count+rs.solid.count;
    if(totalF===0){sentences.push("No se registraron tomas en el período.");}
    else{
      let rTxt="";
      if(feedEvs.length>=3){
        const gaps=[];for(let i=1;i<feedEvs.length;i++)gaps.push((new Date(feedEvs[i].dateTime)-new Date(feedEvs[i-1].dateTime))/36e5);
        const avg=gaps.reduce((a,b)=>a+b)/gaps.length,maxG=Math.max(...gaps),minG=Math.min(...gaps);
        rTxt=(maxG-minG)/avg>1.5?"de forma algo irregular":"con buen ritmo";
      }
      const parts=[];
      if(rs.breast.count>0)parts.push(`${rs.breast.count} ${rs.breast.count===1?"vez":"veces"} de teta${rs.breast.totalMin>0?` (${rs.breast.totalMin} min en total)`:""}`);
      if(rs.pumped.count>0)parts.push(`mamadera ${rs.pumped.count} ${rs.pumped.count===1?"vez":"veces"}${rs.pumped.totalMl>0?` (${rs.pumped.totalMl}ml)`:""}`);
      if(rs.formula.count>0)parts.push(`fórmula ${rs.formula.count} ${rs.formula.count===1?"vez":"veces"}${rs.formula.totalMl>0?` (${rs.formula.totalMl}ml)`:""}`);
      if(rs.solid.count>0)parts.push(`sólido ${rs.solid.count} ${rs.solid.count===1?"vez":"veces"}`);
      const detStr=parts.join(", ");
      sentences.push(rTxt?`Comió ${rTxt}: ${detStr}.`:`Alimentación: ${detStr||totalF+" tomas"}.`);
      if(d24.lastFeedH!==null&&d24.lastFeedH>=4)sentences.push(`Última toma hace ${Math.round(d24.lastFeedH)}h — puede necesitar comer pronto.`);
    }
    const allPoops=[...events.filter(e=>e.babyId===baby.id&&e.type==="poop")].sort((a,b)=>new Date(a.dateTime)-new Date(b.dateTime));
    if(d24.lastPoopH!==null){
      const days=d24.lastPoopDays||0;
      if(allPoops.length>=3){
        const itvs=[];for(let i=1;i<allPoops.length;i++)itvs.push((new Date(allPoops[i].dateTime)-new Date(allPoops[i-1].dateTime))/864e5);
        const avg=Math.round(itvs.reduce((a,b)=>a+b)/itvs.length*10)/10;
        if(days>=5)sentences.push(`Sin popó hace ${days} días (habitual: cada ${avg} día${avg!==1?"s":""}), conviene consultarlo.`);
        else if(days>=Math.ceil(avg*1.5))sentences.push(`Sin popó hace ${days} días, más de lo habitual.`);
        else if(rs.poops>0){
          const lp=allPoops[allPoops.length-1];
          const det=lp&&lp.consistency?`, de consistencia ${lp.consistency.toLowerCase()}${lp.poopColor?` y color ${lp.poopColor.toLowerCase()}`:""}`:".";
          const uc=lp&&(lp.consistency==="Líquida"||lp.consistency==="Dura");
          sentences.push(`Fue al baño ${rs.poops} ${rs.poops===1?"vez":"veces"}${det}${uc?" — consistencia fuera de lo común.":""}`);
        }else sentences.push("No hizo popó en el período.");
      }else{
        if(days>=5)sentences.push(`Lleva ${days} días sin popó — a tener en cuenta.`);
        else if(rs.poops>0){const lp=allPoops[allPoops.length-1];const det=lp&&lp.consistency?` (${lp.consistency.toLowerCase()}, ${(lp.poopColor||"").toLowerCase()})`:".";sentences.push(`Fue al baño ${rs.poops} ${rs.poops===1?"vez":"veces"}${det}`);}
        else sentences.push("No hizo popó en el período.");
      }
    }else sentences.push("No hay registros de popó aún.");
    if(rs.baths>0)sentences.push(`Se bañó ${rs.baths} ${rs.baths===1?"vez":"veces"}.`);
    else if(rangeId!=="24h")sentences.push("Sin baños registrados.");
    if(rs.pees>0)sentences.push(`Pis: ${rs.pees} ${rs.pees===1?"vez":"veces"}.`);
    const nn=[...new Set(rs.notes)].filter(n=>n.length>3).slice(0,2);
    if(nn.length>0)sentences.push(`Notas: ${nn.join("; ")}.`);
    return{baby,prose:sentences.join(" ")};
  });
  return{header,analyses};
}

function calendar(baby,since,rangeId){
  const useWeeks=rangeId==="30d"||rangeId==="all";
  if(useWeeks){
    const cols=Array.from({length:4}).map((_,wi)=>{
      const ws=new Date();ws.setDate(ws.getDate()-(3-wi+1)*7);ws.setHours(0,0,0,0);
      const we=new Date();we.setDate(we.getDate()-(3-wi)*7);we.setHours(0,0,0,0);
      const fc=S.events.filter(e=>e.babyId===baby.id&&e.type==="feed"&&new Date(e.dateTime)>=ws&&new Date(e.dateTime)<we).length;
      const hp=S.events.some(e=>e.babyId===baby.id&&e.type==="poop"&&new Date(e.dateTime)>=ws&&new Date(e.dateTime)<we);
      const hpe=S.events.some(e=>e.babyId===baby.id&&e.type==="pee"&&new Date(e.dateTime)>=ws&&new Date(e.dateTime)<we);
      const hb=S.events.some(e=>e.babyId===baby.id&&e.type==="bath"&&new Date(e.dateTime)>=ws&&new Date(e.dateTime)<we);
      const bH=Math.max(4,Math.min(40,fc*5));
      return`<div style="flex:1;text-align:center;min-width:0"><div style="position:relative;height:44px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:2px"><div style="width:70%;height:${bH}px;background:${fc>0?baby.color+"cc":"#1A1A2E"};border-radius:3px;position:relative">${fc>0?`<span style="position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:8px;color:${baby.color};font-weight:800">${fc}</span>`:""}</div></div><div style="font-size:9px;color:#555">S${wi+1}</div><div style="font-size:8px;margin-top:1px">${hp?"💩":""}${hpe?"💧":""}${hb?"🛁":""}</div></div>`;
    }).join("");
    return`<div style="display:flex;gap:4px;align-items:flex-end">${cols}</div><div style="font-size:9px;color:#333;margin-top:3px">S1–S4 = últimas 4 semanas · nro = tomas</div>`;
  }
  const n=rangeId==="7d"?7:14;
  const cols=Array.from({length:n}).map((_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(n-1-i));d.setHours(0,0,0,0);
    const nx=new Date(d);nx.setDate(nx.getDate()+1);
    const fc=S.events.filter(e=>e.babyId===baby.id&&e.type==="feed"&&new Date(e.dateTime)>=d&&new Date(e.dateTime)<nx).length;
    const hp=S.events.some(e=>e.babyId===baby.id&&e.type==="poop"&&new Date(e.dateTime)>=d&&new Date(e.dateTime)<nx);
    const hpe=S.events.some(e=>e.babyId===baby.id&&e.type==="pee"&&new Date(e.dateTime)>=d&&new Date(e.dateTime)<nx);
    const hb=S.events.some(e=>e.babyId===baby.id&&e.type==="bath"&&new Date(e.dateTime)>=d&&new Date(e.dateTime)<nx);
    const bH=Math.max(4,Math.min(40,fc*7));
    return`<div style="flex:1;text-align:center;min-width:0"><div style="position:relative;height:44px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:2px"><div style="width:100%;max-width:22px;height:${bH}px;background:${fc>0?baby.color+"cc":"#1A1A2E"};border-radius:3px;position:relative">${fc>0?`<span style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:7px;color:${baby.color};font-weight:800">${fc}</span>`:""}</div></div><div style="font-size:7px;color:#444">${d.toLocaleDateString("es-AR",{weekday:"narrow"})}</div><div style="font-size:8px;margin-top:1px">${hp?"💩":""}${hpe?"💧":""}${hb?"🛁":""}</div></div>`;
  }).join("");
  return`<div style="display:flex;gap:2px;align-items:flex-end">${cols}</div><div style="font-size:9px;color:#333;margin-top:3px">nro = tomas por día · 💩💧🛁 = eventos</div>`;
}

function extraction(){
  const exts=[...S.events.filter(e=>e.type==="extraction")].sort(byDate);
  const lastExt=exts[0]||null;
  const lastBreast=[...S.events.filter(e=>e.type==="feed"&&e.subtype==="breast")].sort(byDate)[0]||null;
  const lastBreastBaby=lastBreast?BABIES.find(b=>b.id===lastBreast.babyId):null;
  const extH=lastExt?(Date.now()-new Date(lastExt.dateTime))/36e5:null;
  const breastH=lastBreast?(Date.now()-new Date(lastBreast.dateTime))/36e5:null;
  const bothVH=extH!==null&&breastH!==null&&extH>6&&breastH>6;
  const bothH=extH!==null&&breastH!==null&&extH>3&&breastH>3;
  const bc=bothVH?"#EF5350":bothH?"#FFB74D":"#F48FB1";
  const banner=`<div style="background:${bc}18;border:1px solid ${bc}40;border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:12px"><div style="flex:1;text-align:center"><div style="font-size:10px;color:${bc};font-weight:800;letter-spacing:.5px;margin-bottom:4px">ÚLTIMA EXTRACCIÓN</div><div style="font-size:15px;font-weight:900;color:#fff">${extH!==null?ago(lastExt.dateTime):"Nunca"}</div>${lastExt&&lastExt.ml?`<div style="font-size:10px;color:${bc};margin-top:2px">${lastExt.ml}ml</div>`:""}</div><div style="width:1px;background:${bc}20"></div><div style="flex:1;text-align:center"><div style="font-size:10px;color:${bc};font-weight:800;letter-spacing:.5px;margin-bottom:4px">ÚLTIMA SUCCIÓN</div><div style="font-size:15px;font-weight:900;color:#fff">${breastH!==null?ago(lastBreast.dateTime):"Nunca"}</div>${lastBreastBaby?`<div style="font-size:10px;color:${lastBreastBaby.color};margin-top:2px">${lastBreastBaby.emoji} ${lastBreastBaby.name}</div>`:""}</div></div>`;
  let atxt="";
  if(exts.length>=2){
    const mlA=exts.filter(e=>e.ml).map(e=>e.ml);
    const avgMl=mlA.length?Math.round(mlA.reduce((a,b)=>a+b)/mlA.length):null;
    const itvs=[];for(let i=1;i<exts.length;i++)itvs.push((new Date(exts[i-1].dateTime)-new Date(exts[i].dateTime))/36e5);
    const avgI=itvs.length?Math.round(itvs.reduce((a,b)=>a+b)/itvs.length*10)/10:null;
    let trend="";
    if(exts.length>=4&&mlA.length>=4){const h=Math.ceil(mlA.length/2);const re=mlA.slice(0,h).reduce((a,b)=>a+b)/h,ol=mlA.slice(h).reduce((a,b)=>a+b)/(mlA.length-h);if(re>ol*1.2)trend=" La producción viene en aumento.";else if(re<ol*0.8)trend=" Se nota una baja en la producción reciente.";else trend=" La producción se mantiene estable.";}
    const p=[];if(avgMl)p.push(`Promedio por extracción: ${avgMl}ml.`);if(avgI)p.push(`Frecuencia promedio: cada ${avgI}h.`);
    atxt=p.join(" ")+trend;
  }else if(exts.length===1)atxt="Solo hay una extracción registrada. Agregá más para ver tendencias.";
  else atxt="Sin extracciones registradas todavía.";
  const aBox=`<div style="background:#1A1A2E;border:1px solid #F48FB130;border-radius:12px;padding:12px;margin-bottom:14px"><div style="font-size:10px;color:#F48FB1;font-weight:800;letter-spacing:.5px;margin-bottom:6px">ANÁLISIS</div><div style="font-size:13px;color:#bbb;line-height:1.65">${esc(atxt)}</div></div>`;
  const rows=exts.map(ev=>`<div class="ev-row" data-id="${ev.id}"><span style="font-size:21px;width:34px;height:34px;background:#F48FB115;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">🥛</span><div style="flex:1"><div style="font-size:13px;color:#F48FB1;font-weight:700">Extracción${ev.ml?" · "+ev.ml+"ml":""}</div>${ev.notes?`<div style="font-size:11px;color:#555;margin-top:1px">${esc(ev.notes)}</div>`:""}</div><div style="text-align:right;flex-shrink:0"><div style="font-size:12px;color:#888">${fmtTime(ev.dateTime)}</div><div style="font-size:10px;color:#444">${fmtDate(ev.dateTime)}</div></div><button class="btn-del" data-id="${ev.id}" onclick="event.stopPropagation()" style="background:#EF535018;border:1px solid #EF535030;border-radius:8px;padding:6px 8px;cursor:pointer;font-size:12px;color:#EF5350;flex-shrink:0">🗑️</button></div>`).join("");
  return`<button id="btn-add-ext" style="width:100%;padding:14px;border-radius:14px;background:#F48FB120;border:1.5px solid #F48FB150;color:#F48FB1;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px">+ Nueva extracción</button>${banner}${aBox}<div style="font-size:10px;color:#333;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Historial</div>${rows||`<div style="text-align:center;color:#444;padding:32px 0;font-size:13px">Sin extracciones</div>`}`;
}

function nav(){
  const tabs=[{id:"home",icon:"🏠",lbl:"Inicio"},{id:"log",icon:"📋",lbl:"Registro"},{id:"extraction",icon:"🥛",lbl:"Extracción"},{id:"stats",icon:"📊",lbl:"Resumen"}];
  const left=tabs.slice(0,2),right=tabs.slice(2);
  const tb=t=>`<button class="btn-tab" data-tab="${t.id}" style="flex:1;padding:8px 0 12px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px"><span style="font-size:19px;opacity:${S.activeTab===t.id?1:.3}">${t.icon}</span><span style="font-size:9px;font-weight:700;color:${S.activeTab===t.id?"#fff":"#444"}">${t.lbl}</span>${S.activeTab===t.id?`<div class="nav-dot"></div>`:""}</button>`;
  return`<div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:#0D0D1Af5;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid #1A1A2E;display:flex;align-items:flex-end;z-index:50;height:58px">${left.map(tb).join("")}<div style="width:64px;flex-shrink:0"></div>${right.map(tb).join("")}</div><button id="fab">+</button>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(babyId,type){
  MS={babyId:babyId||"santi",type:type||"feed",subtype:"breast",ml:"150",durationMin:"10",consistency:"Blanda",poopColor:"Marrón",otherSubtype:"generic",notes:"",dateTime:nowInput()};
  ME={};S.modal=true;render();
}

function modal(){
  const{babyId,type,subtype,ml,consistency,poopColor,notes,dateTime,durationMin,otherSubtype}=MS;
  const selB=BABIES.find(b=>b.id===babyId)||BABIES[0];
  const isExt=type==="extraction",isBreast=type==="feed"&&subtype==="breast";
  const needsMl=(type==="feed"&&(subtype==="pumped"||subtype==="formula"))||isExt;
  const maxDT=nowInput();
  const bb=BABIES.map(b=>`<button class="m-baby" data-baby="${b.id}" style="flex:1;padding:10px 0;border-radius:12px;background:${babyId===b.id?b.color+"30":"#0D0D1A"};border:2px solid ${babyId===b.id?b.color:"#2A2A3E"};color:${babyId===b.id?b.color:"#666"};font-weight:800;font-size:15px;cursor:pointer">${b.emoji} ${b.name}</button>`).join("");
  const tb=Object.entries(EVT).map(([k,v])=>`<button class="m-type" data-t="${k}" style="padding:8px 0;border-radius:12px;background:${type===k?v.color+"25":"#0D0D1A"};border:2px solid ${type===k?v.color:"#2A2A3E"};color:${type===k?v.color:"#555"};font-size:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px">${v.icon}<span style="font-size:7px;font-weight:700">${v.label}</span></button>`).join("");
  const sb=FEED_SUBS.map(s=>`<button class="m-sub" data-s="${s.id}" style="padding:7px 12px;border-radius:10px;background:${subtype===s.id?"#4FC3F730":"#0D0D1A"};border:1.5px solid ${subtype===s.id?"#4FC3F7":"#2A2A3E"};color:${subtype===s.id?"#4FC3F7":"#666"};font-size:12px;font-weight:700;cursor:pointer">${s.label}</button>`).join("");
  const db=BREAST_DUR.map(v=>`<button class="m-dur" data-v="${v}" style="padding:7px 12px;border-radius:10px;background:${durationMin==v?"#4FC3F730":"#0D0D1A"};border:1.5px solid ${durationMin==v?"#4FC3F7":"#2A2A3E"};color:${durationMin==v?"#4FC3F7":"#666"};font-size:13px;font-weight:700;cursor:pointer">${v}min</button>`).join("");
  const mb=ML_OPTS.map(v=>`<button class="m-ml" data-v="${v}" style="padding:7px 12px;border-radius:10px;background:${ml==v?"#4FC3F730":"#0D0D1A"};border:1.5px solid ${ml==v?"#4FC3F7":"#2A2A3E"};color:${ml==v?"#4FC3F7":"#666"};font-size:13px;font-weight:700;cursor:pointer">${v}ml</button>`).join("");
  const cb=POOP_CONS.map(c=>`<button class="m-cons" data-c="${c}" style="padding:7px 12px;border-radius:10px;background:${consistency===c?"#FFCC8030":"#0D0D1A"};border:1.5px solid ${consistency===c?"#FFCC80":"#2A2A3E"};color:${consistency===c?"#FFCC80":"#666"};font-size:12px;font-weight:700;cursor:pointer">${c}</button>`).join("");
  const pb=POOP_COL.map(c=>`<button class="m-pcol" data-c="${c}" style="padding:7px 12px;border-radius:10px;background:${poopColor===c?"#FFCC8030":"#0D0D1A"};border:1.5px solid ${poopColor===c?"#FFCC80":"#2A2A3E"};color:${poopColor===c?"#FFCC80":"#666"};font-size:12px;font-weight:700;cursor:pointer">${c}</button>`).join("");
  const ob=OTHER_SUBS.map(s=>`<button class="m-oth" data-s="${s.id}" style="padding:7px 12px;border-radius:10px;background:${otherSubtype===s.id?"#90A4AE30":"#0D0D1A"};border:1.5px solid ${otherSubtype===s.id?"#90A4AE":"#2A2A3E"};color:${otherSubtype===s.id?"#90A4AE":"#666"};font-size:12px;font-weight:700;cursor:pointer">${s.icon} ${s.label}</button>`).join("");
  const sc=isExt?"#F48FB1":selB.color;
  const dtErr=ME.dt?`<div style="font-size:11px;color:#EF5350;margin-top:4px;font-weight:700">⚠️ No se puede cargar un registro con hora futura</div>`:"";
  return`<div class="modal-bd" id="modal-bd"><div class="modal-sh"><div style="width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 16px"></div><div style="font-size:18px;font-weight:800;color:#fff;margin-bottom:16px">Nuevo registro</div>${!isExt?`<div style="margin-bottom:14px"><div class="sl">Bebé</div><div style="display:flex;gap:8px">${bb}</div></div>`:`<div style="margin-bottom:14px;background:#F48FB115;border:1px solid #F48FB130;border-radius:12px;padding:10px;text-align:center;font-size:15px;color:#F48FB1;font-weight:700">🥛 Extracción</div>`}<div style="margin-bottom:14px"><div class="sl">Tipo</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${tb}</div></div>${type==="feed"?`<div style="margin-bottom:14px"><div class="sl">¿Cómo?</div><div style="display:flex;gap:6px;flex-wrap:wrap">${sb}</div></div>`:""} ${isBreast?`<div style="margin-bottom:14px"><div class="sl">Tiempo de succión (min)</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${db}</div><input type="number" id="m-dur-i" value="${durationMin||""}" placeholder="Otro (min)" class="inp" style="width:130px"/></div>`:""} ${needsMl?`<div style="margin-bottom:14px"><div class="sl">Cantidad (ml)</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${mb}</div><input type="number" id="m-ml-i" value="${ml||""}" placeholder="Otro (ml)" class="inp" style="width:130px"/></div>`:""} ${type==="poop"?`<div style="margin-bottom:14px"><div class="sl">Consistencia</div><div style="display:flex;gap:6px;flex-wrap:wrap">${cb}</div></div><div style="margin-bottom:14px"><div class="sl">Color</div><div style="display:flex;gap:6px;flex-wrap:wrap">${pb}</div></div>`:""} ${type==="other"?`<div style="margin-bottom:14px"><div class="sl">Categoría</div><div style="display:flex;gap:6px;flex-wrap:wrap">${ob}</div></div>`:""}<div style="margin-bottom:14px"><div class="sl">Fecha y hora${isBreast?" de inicio":""}</div><div style="display:flex;gap:6px;align-items:center"><input type="datetime-local" id="m-dt" value="${dateTime}" max="${maxDT}" class="inp${ME.dt?" err":""}" style="flex:1"/><button id="btn-now" style="padding:10px 12px;border-radius:10px;background:#1A1A2E;border:1px solid #2A2A3E;color:#888;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">Ahora</button></div>${dtErr}</div><div style="margin-bottom:8px"><div class="sl">Notas (opcional)</div><textarea id="m-notes" rows="2" placeholder="Notas..." class="inp" style="resize:none;line-height:1.5">${esc(notes||"")}</textarea></div></div><div class="modal-fab-bar"><button id="btn-modal-back" style="flex:1;padding:13px;border-radius:12px;background:#1A1A2E;border:1px solid #2A2A3E;color:#aaa;font-size:13px;font-weight:700;cursor:pointer">← Volver</button><button id="btn-save" style="flex:2;padding:13px;border-radius:12px;background:${sc};border:none;color:#000;font-size:15px;font-weight:900;cursor:pointer">✓ Guardar</button></div></div>`;
}

function detail(){
  const ev=S.events.find(e=>e.id===S.detailId);if(!ev)return"";
  const baby=ev.babyId?BABIES.find(b=>b.id===ev.babyId):null;
  const et=EVT[ev.type]||{label:"Otro",icon:"📝",color:"#90A4AE"};
  let lbl=et.label;
  if(ev.type==="feed"&&ev.subtype)lbl=FEED_SUBS.find(s=>s.id===ev.subtype)?.label||lbl;
  if(ev.type==="other"&&ev.otherSubtype){const o=OTHER_SUBS.find(s=>s.id===ev.otherSubtype);if(o)lbl=`${o.icon} ${o.label}`;}
  const rows=[baby?{l:"Bebé",v:`${baby.emoji} ${baby.name}`}:null,{l:"Tipo",v:`${et.icon} ${lbl}`},{l:"Fecha",v:new Date(ev.dateTime).toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})},{l:"Hora",v:fmtTime(ev.dateTime)},ev.ml?{l:"Cantidad",v:ev.ml+" ml"}:null,ev.durationMin?{l:"Duración",v:ev.durationMin+" min"}:null,ev.consistency?{l:"Consistencia",v:ev.consistency}:null,ev.poopColor?{l:"Color",v:ev.poopColor}:null,ev.notes?{l:"Notas",v:ev.notes}:null].filter(Boolean).map(r=>`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid #1A1A2E;gap:12px"><span style="font-size:12px;color:#555;font-weight:700;flex-shrink:0">${r.l}</span><span style="font-size:13px;color:#fff;font-weight:600;text-align:right">${esc(String(r.v))}</span></div>`).join("");
  const bc=baby?baby.color:"#F48FB1";
  return`<div class="det-bd" id="det-bd"><div class="det-sh"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><button id="btn-det-close" style="background:#1A1A2E;border:1px solid #2A2A3E;border-radius:10px;padding:8px 14px;color:#aaa;font-size:13px;font-weight:700;cursor:pointer">← Cerrar</button><div style="font-size:12px;color:#333;font-weight:700">Detalle</div><button class="btn-del" data-id="${ev.id}" style="background:#EF535018;border:1px solid #EF535030;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:12px;color:#EF5350;font-weight:700">🗑️ Borrar</button></div><div style="font-size:32px;text-align:center;margin-bottom:4px">${et.icon}</div><div style="font-size:15px;font-weight:900;color:${bc};text-align:center;margin-bottom:14px">${baby?baby.name+" · ":""}${lbl}</div>${rows}</div></div>`;
}

function confirmDel(){
  return`<div class="conf-bd" id="conf-bd"><div class="conf-bx"><div style="font-size:36px;margin-bottom:12px">🗑️</div><div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:8px">¿Borrar registro?</div><div style="font-size:13px;color:#666;margin-bottom:4px">Esta acción no se puede deshacer.</div><div style="font-size:12px;color:#EF5350;font-weight:700;margin-bottom:20px">Confirmá que querés eliminarlo.</div><div style="display:flex;gap:8px"><button id="btn-cancel-del" style="flex:1;padding:12px;border-radius:12px;background:#0D0D1A;border:1px solid #2A2A3E;color:#666;font-size:14px;font-weight:700;cursor:pointer">Cancelar</button><button id="btn-confirm-del" style="flex:1;padding:12px;border-radius:12px;background:#EF535030;border:1px solid #EF535060;color:#EF5350;font-size:14px;font-weight:700;cursor:pointer">Borrar</button></div></div></div>`;
}

// ── BIND ──────────────────────────────────────────────────────────────────────
function bind(){
  const $=id=>document.getElementById(id);
  $("btn-ver-todo")?.addEventListener("click",()=>{S.activeTab="log";render();});
  $("btn-add-ext")?.addEventListener("click",()=>openModal(null,"extraction"));
  document.querySelectorAll(".btn-tab").forEach(b=>b.addEventListener("click",()=>{S.activeTab=b.dataset.tab;render();}));
  document.querySelectorAll(".fbaby").forEach(b=>b.addEventListener("click",()=>{S.filterBaby=b.dataset.f;render();}));
  document.querySelectorAll(".ftype").forEach(b=>b.addEventListener("click",()=>{S.filterType=b.dataset.f;render();}));
  document.querySelectorAll(".btn-range").forEach(b=>b.addEventListener("click",()=>{S.statsRange=b.dataset.range;render();}));
  document.querySelectorAll(".ev-row").forEach(row=>row.addEventListener("click",e=>{if(e.target.closest(".btn-del"))return;const id=row.dataset.id;if(id){S.detailId=id;render();}}));
  document.querySelectorAll(".btn-del").forEach(b=>b.addEventListener("click",()=>{S.confirmDel=b.dataset.id;S.detailId=null;render();}));
  $("btn-confirm-del")?.addEventListener("click",()=>{const id=S.confirmDel;deletedToast(id);deleteEvent(id);S.confirmDel=null;render();});
  $("btn-cancel-del")?.addEventListener("click",()=>{S.confirmDel=null;render();});
  $("conf-bd")?.addEventListener("click",e=>{if(e.target===$("conf-bd")){S.confirmDel=null;render();}});
  $("btn-det-close")?.addEventListener("click",()=>{S.detailId=null;render();});
  $("det-bd")?.addEventListener("click",e=>{if(e.target===$("det-bd")){S.detailId=null;render();}});
  if(!S.modal)return;
  $("btn-modal-back")?.addEventListener("click",()=>{S.modal=null;render();});
  $("modal-bd")?.addEventListener("click",e=>{if(e.target===$("modal-bd")){S.modal=null;render();}});
  document.querySelectorAll(".m-baby").forEach(b=>b.addEventListener("click",()=>{MS.babyId=b.dataset.baby;render();}));
  document.querySelectorAll(".m-type").forEach(b=>b.addEventListener("click",()=>{MS.type=b.dataset.t;ME={};render();}));
  document.querySelectorAll(".m-sub").forEach(b=>b.addEventListener("click",()=>{MS.subtype=b.dataset.s;ME={};if(b.dataset.s==="pumped"||b.dataset.s==="formula")MS.ml=MS.ml||"150";if(b.dataset.s==="breast")MS.durationMin=MS.durationMin||"10";render();}));
  document.querySelectorAll(".m-ml").forEach(b=>b.addEventListener("click",()=>{MS.ml=b.dataset.v;render();}));
  document.querySelectorAll(".m-dur").forEach(b=>b.addEventListener("click",()=>{MS.durationMin=b.dataset.v;render();}));
  document.querySelectorAll(".m-cons").forEach(b=>b.addEventListener("click",()=>{MS.consistency=b.dataset.c;render();}));
  document.querySelectorAll(".m-pcol").forEach(b=>b.addEventListener("click",()=>{MS.poopColor=b.dataset.c;render();}));
  document.querySelectorAll(".m-oth").forEach(b=>b.addEventListener("click",()=>{MS.otherSubtype=b.dataset.s;render();}));
  $("m-ml-i")?.addEventListener("input",e=>{MS.ml=e.target.value;});
  $("m-dur-i")?.addEventListener("input",e=>{MS.durationMin=e.target.value;});
  $("m-dt")?.addEventListener("change",e=>{MS.dateTime=e.target.value;});
  $("m-notes")?.addEventListener("input",e=>{MS.notes=e.target.value;});
  $("btn-now")?.addEventListener("click",()=>{MS.dateTime=nowInput();const d=$("m-dt");if(d)d.value=MS.dateTime;});
  $("btn-save")?.addEventListener("click",()=>{
    const dtEl=$("m-dt"),nEl=$("m-notes"),mlEl=$("m-ml-i"),dEl=$("m-dur-i");
    if(dtEl)MS.dateTime=dtEl.value;if(nEl)MS.notes=nEl.value;
    if(mlEl&&mlEl.value)MS.ml=mlEl.value;if(dEl&&dEl.value)MS.durationMin=dEl.value;
    ME={};
    // Validate: no future timestamps
    if(new Date(MS.dateTime)>new Date()){ME.dt=true;render();return;}
    const ev={
      id:crypto.randomUUID(),dateTime:new Date(MS.dateTime).toISOString(),notes:MS.notes,type:MS.type,
      ...(MS.type!=="extraction"&&{babyId:MS.babyId}),
      ...(MS.type==="feed"&&{subtype:MS.subtype,ml:(MS.subtype==="pumped"||MS.subtype==="formula")&&MS.ml?parseInt(MS.ml):null,durationMin:MS.subtype==="breast"&&MS.durationMin?parseInt(MS.durationMin):null}),
      ...(MS.type==="extraction"&&{ml:MS.ml?parseInt(MS.ml):null}),
      ...(MS.type==="poop"&&{consistency:MS.consistency,poopColor:MS.poopColor}),
      ...(MS.type==="other"&&{otherSubtype:MS.otherSubtype}),
    };
    addEvent(ev);S.modal=null;render();savedToast(ev);
  });
}

render();
fetchAllEvents();
</script>
</body>
</html>
