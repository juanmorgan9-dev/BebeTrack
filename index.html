<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>BebeTrack 🌙</title>
  <meta name="theme-color" content="#0A0A15"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="BebeTrack"/>

  <!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  FIREBASE – SINCRONIZACIÓN EN TIEMPO REAL                       ║
  ║  1. https://console.firebase.google.com → crear proyecto        ║
  ║  2. Agregar app web → copiar config abajo                       ║
  ║  3. Realtime Database → crear base (modo prueba)                ║
  ║  4. Reemplazar los YOUR_* con tu config real y subir a Netlify  ║
  ╚══════════════════════════════════════════════════════════════════╝
  -->
  <script type="module">
    import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import{getDatabase,ref,onValue,set}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    const cfg={
      apiKey:"YOUR_API_KEY",
      authDomain:"YOUR_PROJECT.firebaseapp.com",
      databaseURL:"https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId:"YOUR_PROJECT",
      storageBucket:"YOUR_PROJECT.appspot.com",
      messagingSenderId:"YOUR_SENDER_ID",
      appId:"YOUR_APP_ID"
    };
    if(!cfg.apiKey.startsWith("YOUR_")){
      try{
        const db=getDatabase(initializeApp(cfg));
        const r=ref(db,"bebetrack/events");
        onValue(r,snap=>{
          const d=snap.val();
          window._fbEvs=d?Object.values(d):[];
          window._fbReady=true;
          if(typeof window._onFbUp==="function")window._onFbUp(window._fbEvs);
        });
        const _save=evs=>{const o={};evs.forEach(e=>{o[String(e.id)]=e;});set(r,o);};
        window._fbAdd=ev=>{_save([...(window._fbEvs||[]).filter(e=>e.id!==ev.id),ev]);};
        window._fbDel=id=>{_save((window._fbEvs||[]).filter(e=>e.id!==id));};
        console.log("✅ Firebase OK");
      }catch(e){console.warn("Firebase:",e);}
    }
  </script>

  <style>

    #pull-bar.show{opacity:1}

    .nav-dot{width:4px;height:4px;border-radius:50%;background:#4FC3F7;margin:1px auto 0}
    .modal-bd{position:fixed;inset:0;background:#000c;display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fi .2s}
    .modal-sh{background:#12121F;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;padding-bottom:36px;animation:su .25s}
    .conf-bd{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:200;animation:fi .15s}
    .conf-bx{background:#1A1A2E;border:1px solid #2A2A4E;border-radius:18px;padding:24px;width:300px;text-align:center}
    .det-bd{position:fixed;inset:0;background:#000c;display:flex;align-items:flex-end;justify-content:center;z-index:150;animation:fi .2s}

// ═══ STATE ════════════════════════════════════════════════════════════════════
let S={events:[],activeTab:"home",modal:null,filterBaby:"all",filterType:"all",confirmDel:null,detailId:null,statsRange:"7d",fbReady:false};
let MS={},ME={};

// ═══ STORAGE & SYNC ═══════════════════════════════════════════════════════════
function loadLocal(){try{const r=localStorage.getItem(LS_KEY);if(r)return JSON.parse(r);}catch(e){}return mockData();}
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(S.events));}catch(e){}}
const byDate=(a,b)=>new Date(b.dateTime)-new Date(a.dateTime);

function addEvent(ev){
  S.events=[ev,...S.events].sort(byDate);
  saveLocal();
  if(window._fbAdd){window._fbAdd(ev);badge("syncing");}
}
function deleteEvent(id){
  S.events=S.events.filter(e=>e.id!==id);
  saveLocal();
  if(window._fbDel)window._fbDel(id);
}
window._onFbUp=function(fbEvs){
  S.events=fbEvs.sort(byDate);saveLocal();S.fbReady=true;badge("live");render();
};
function badge(s){
  const el=document.getElementById("sync-badge");if(!el)return;
  el.className=s;
  if(s==="live")el.textContent="🟢 En vivo";
  if(s==="syncing"){el.textContent="🔄 Guardando...";setTimeout(()=>badge("live"),1800);}
}
function doRefresh(){
  const pb=document.getElementById("pull-bar");
  if(pb){pb.classList.add("show");setTimeout(()=>pb.classList.remove("show"),1200);}
  if(!S.fbReady){S.events=loadLocal();render();showToast("🔄 Actualizado");}
  else showToast("🟢 Datos al día");
}
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible"&&!S.fbReady){
    const f=loadLocal();if(JSON.stringify(f)!==JSON.stringify(S.events)){S.events=f;render();}
  }
});
setInterval(()=>{if(!S.fbReady){const f=loadLocal();if(JSON.stringify(f)!==JSON.stringify(S.events)){S.events=f;render();}}},15000);
let ptY=0;
document.addEventListener("touchstart",e=>{ptY=e.touches[0].clientY;},{passive:true});
document.addEventListener("touchend",e=>{if(e.changedTouches[0].clientY-ptY>80&&window.scrollY===0&&!S.modal)doRefresh();},{passive:true});

// ═══ UTILS ════════════════════════════════════════════════════════════════════
function fmtTime(iso){return new Date(iso).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});}
function fmtDate(iso){
  const d=new Date(iso),t=new Date();t.setHours(0,0,0,0);
  const df=Math.floor((t-new Date(new Date(iso).toDateString()))/864e5);
  if(df===0)return"Hoy";if(df===1)return"Ayer";
  return d.toLocaleDateString("es-AR",{day:"numeric",month:"short"});
}
// ago: shows minutes if < 60min, else hours
function ago(iso){
  const m=Math.round((Date.now()-new Date(iso))/6e4);
  if(m<1)return"Ahora";if(m<60)return`Hace ${m} min`;
  const h=Math.floor(m/60),r=m%60;return r?`Hace ${h}h ${r}m`:`Hace ${h}h`;
}
function toInput(iso){const d=new Date(iso),p=n=>String(n).padStart(2,"0");return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function rangeStart(r){
  if(r==="all")return new Date(0);
  if(r==="24h")return new Date(Date.now()-864e5);
  const d=new Date();d.setDate(d.getDate()-(r==="7d"?7:30));d.setHours(0,0,0,0);return d;
}
// "Último registro hace X min/h (HH:MM)"
function lastRegStr(lu){
  if(!lu)return"";
  const mins=Math.round((Date.now()-new Date(lu))/6e4);
  let rel;if(mins<1)rel="hace menos de 1 min";else if(mins<60)rel=`hace ${mins} min`;else{const h=Math.floor(mins/60),r=mins%60;rel=r?`hace ${h}h ${r}m`:`hace ${h}h`;}
  return`Último registro ${rel} (${fmtTime(lu)})`;
}

// ═══ STATS HELPERS ════════════════════════════════════════════════════════════
function stats24h(events,babyId){
  const since=new Date(Date.now()-864e5);
  const evs=events.filter(e=>e.babyId===babyId&&new Date(e.dateTime)>=since);
  const feeds=evs.filter(e=>e.type==="feed");
  const lf=[...events.filter(e=>e.babyId===babyId&&e.type==="feed")].sort(byDate)[0]||null;
  const lp=[...events.filter(e=>e.babyId===babyId&&e.type==="poop")].sort(byDate)[0]||null;
  const lb=[...events.filter(e=>e.babyId===babyId&&e.type==="bath")].sort(byDate)[0]||null;
  return{
    feeds:feeds.length,totalMl:feeds.reduce((a,e)=>a+(e.ml||0),0),
    pees:evs.filter(e=>e.type==="pee").length,
    poops:evs.filter(e=>e.type==="poop").length,
    lastFeedH:lf?(Date.now()-new Date(lf.dateTime))/36e5:null,
    lastPoopH:lp?(Date.now()-new Date(lp.dateTime))/36e5:null,
    lastPoopDays:lp?Math.floor((Date.now()-new Date(lp.dateTime))/864e5):null,
    lastPoopDate:lp?new Date(lp.dateTime):null,
    lastBathH:lb?(Date.now()-new Date(lb.dateTime))/36e5:null,
  };
}
function statsRange(events,babyId,r){
  const since=rangeStart(r);
  const evs=events.filter(e=>e.babyId===babyId&&new Date(e.dateTime)>=since);
  const br=evs.filter(e=>e.type==="feed"&&e.subtype==="breast");
  const pu=evs.filter(e=>e.type==="feed"&&e.subtype==="pumped");
  const fo=evs.filter(e=>e.type==="feed"&&e.subtype==="formula");
  const so=evs.filter(e=>e.type==="feed"&&e.subtype==="solid");
  return{
    baths:evs.filter(e=>e.type==="bath").length,
    pees:evs.filter(e=>e.type==="pee").length,
    poops:evs.filter(e=>e.type==="poop").length,
    breast:{count:br.length,totalMin:br.reduce((a,e)=>a+(e.durationMin||0),0)},
    pumped:{count:pu.length,totalMl:pu.reduce((a,e)=>a+(e.ml||0),0)},
    formula:{count:fo.length,totalMl:fo.reduce((a,e)=>a+(e.ml||0),0)},
    solid:{count:so.length},
  };
}

// ═══ COLOR HELPERS ════════════════════════════════════════════════════════════
// Poop: green <48h, yellow <5d, red ≥5d
function poopCol(h){
  if(h===null)return{c:"#90A4AE",icon:""};
  if(h<48)  return{c:"#66BB6A",icon:"✅"};
  if(h<120) return{c:"#FFB74D",icon:"⚠️"};  // <5 days
  return          {c:"#EF5350",icon:"🚨"};
}
// Feed: green <3h, yellow 3-6h, red ≥6h
function feedCol(h){
  if(h===null)return"#90A4AE";
  if(h<3)return"#66BB6A";
  if(h<6)return"#FFB74D";
  return"#EF5350";
}
// Bath: green <48h, yellow 48h-3d, red ≥3d
function bathCol(h){
  if(h===null)return{c:"#90A4AE",icon:""};
  if(h<48) return{c:"#66BB6A",icon:"✅"};
  if(h<72) return{c:"#FFB74D",icon:"⚠️"};  // <3 days
  return        {c:"#EF5350",icon:"🚨"};
}
// Display time: if <60min show minutes, else show hours
function timeStr(h){
  if(h===null)return"—";
  if(h<1){const m=Math.round(h*60);return`hace ${m} min`;}
  if(h<24)return`hace ${Math.floor(h)}h`;
  const d=Math.floor(h/24);return`hace ${d} día${d!==1?"s":""}`;
}

// ═══ TOAST ════════════════════════════════════════════════════════════════════
let toastT;
function showToast(m){
  const el=document.getElementById("toast");if(!el)return;
  el.textContent=m;el.classList.add("show");
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),2800);
}

// ═══ NARRATIVE ENGINE ═════════════════════════════════════════════════════════
function buildNarrative(events,rangeId){
  const rLbl={"24h":"las últimas 24 horas","7d":"los últimos 7 días","30d":"el último mes","all":"el período completo"}[rangeId];
  const rsA=statsRange(events,"santi",rangeId),rsB=statsRange(events,"jero",rangeId);
  const d24A=stats24h(events,"santi"),d24B=stats24h(events,"jero");
  const totalFA=rsA.breast.count+rsA.pumped.count+rsA.formula.count+rsA.solid.count;
  const totalFB=rsB.breast.count+rsB.pumped.count+rsB.formula.count+rsB.solid.count;

  // Brief header – only mention comparison if notably different, otherwise just period summary
  const cmpParts=[];
  if(totalFA===0&&totalFB===0){cmpParts.push(`Sin datos de alimentación en ${rLbl}.`);}
  else{
    // Only compare if notably different (>30%)
    if(totalFA>totalFB*1.4) cmpParts.push(`Santi tomó considerablemente más que Jero en ${rLbl}.`);
    else if(totalFB>totalFA*1.4) cmpParts.push(`Jero tomó considerablemente más que Santi en ${rLbl}.`);
    else cmpParts.push(`Ambos con alimentación similar en ${rLbl}.`);
    if((d24A.lastPoopDays||0)>=5) cmpParts.push("⚠️ Santi lleva varios días sin popó.");
    if((d24B.lastPoopDays||0)>=5) cmpParts.push("⚠️ Jero lleva varios días sin popó.");
  }
  const header=cmpParts.join(" ");

  // Per-baby prose
  const analyses=BABIES.map(baby=>{
    const rs=baby.id==="santi"?rsA:rsB;
    const d24=baby.id==="santi"?d24A:d24B;
    const since=rangeStart(rangeId);
    const sentences=[];

    // Feeding
    const totalF=rs.breast.count+rs.pumped.count+rs.formula.count+rs.solid.count;
    if(totalF===0){
      sentences.push("No se registraron tomas en el período.");
    }else{
      const feedEvs=[...events.filter(e=>e.babyId===baby.id&&e.type==="feed"&&new Date(e.dateTime)>=since)].sort((a,b)=>new Date(a.dateTime)-new Date(b.dateTime));
      let rhythmTxt="";
      if(feedEvs.length>=3){
        const gaps=[];for(let i=1;i<feedEvs.length;i++)gaps.push((new Date(feedEvs[i].dateTime)-new Date(feedEvs[i-1].dateTime))/36e5);
        const avg=gaps.reduce((a,b)=>a+b)/gaps.length,maxG=Math.max(...gaps),minG=Math.min(...gaps);
        const irreg=(maxG-minG)/avg>1.5&&gaps.length>=3;
        rhythmTxt=irreg?"de forma algo irregular":"con buen ritmo";
      }
      const parts=[];
      if(rs.breast.count>0)parts.push(`${rs.breast.count} vez${rs.breast.count!==1?"es":""} de teta${rs.breast.totalMin>0?` (${rs.breast.totalMin} min en total)`:""}`);
      if(rs.pumped.count>0)parts.push(`mamadera ${rs.pumped.count} vez${rs.pumped.count!==1?"es":""}${rs.pumped.totalMl>0?` (${rs.pumped.totalMl}ml)`:""}`);
      if(rs.formula.count>0)parts.push(`fórmula ${rs.formula.count} vez${rs.formula.count!==1?"es":""}${rs.formula.totalMl>0?` (${rs.formula.totalMl}ml)`:""}`);
      if(rs.solid.count>0)parts.push(`sólido ${rs.solid.count} vez${rs.solid.count!==1?"es":""}`);
      const detStr=parts.join(", ");
      if(rhythmTxt)sentences.push(`Comió ${rhythmTxt}${detStr?": "+detStr:""}.`);
      else sentences.push(`Alimentación: ${detStr||totalF+" tomas"}.`);
      if(d24.lastFeedH!==null&&d24.lastFeedH>=4)sentences.push(`La última toma fue hace ${Math.round(d24.lastFeedH)}h — puede necesitar comer pronto.`);
    }

    // Poop
    const allPoops=[...events.filter(e=>e.babyId===baby.id&&e.type==="poop")].sort((a,b)=>new Date(a.dateTime)-new Date(b.dateTime));
    if(d24.lastPoopH!==null){
      const days=d24.lastPoopDays||0;
      if(allPoops.length>=3){
        const itvs=[];for(let i=1;i<allPoops.length;i++)itvs.push((new Date(allPoops[i].dateTime)-new Date(allPoops[i-1].dateTime))/864e5);
        const avg=Math.round(itvs.reduce((a,b)=>a+b)/itvs.length*10)/10;
        if(days>=5)sentences.push(`Sin popó hace ${days} días (lo habitual es cada ${avg} día${avg!==1?"s":""}), es conveniente consultarlo.`);
        else if(days>=Math.ceil(avg*1.5))sentences.push(`Sin popó hace ${days} días, más de lo habitual para él.`);
        else if(rs.poops>0){
          const lp=allPoops[allPoops.length-1];
          const det=lp&&lp.consistency?`, de consistencia ${lp.consistency.toLowerCase()}${lp.poopColor?` y color ${lp.poopColor.toLowerCase()}`:""}`:".";
          // note: unusual if normally different
          const unusualCons=lp&&(lp.consistency==="Líquida"||lp.consistency==="Dura");
          sentences.push(`Fue al baño ${rs.poops} vez${rs.poops!==1?"es":""}${det}${unusualCons?" — una consistencia fuera de lo común para tener en cuenta.":""}`);
        }else sentences.push("No hizo popó durante el período.");
      }else{
        if(days>=5)sentences.push(`Lleva ${days} días sin popó — algo a tener en cuenta.`);
        else if(rs.poops>0){
          const lp=allPoops[allPoops.length-1];
          const det=lp&&lp.consistency?` (${lp.consistency.toLowerCase()}, ${(lp.poopColor||"").toLowerCase()})`:".";
          sentences.push(`Fue al baño ${rs.poops} vez${rs.poops!==1?"es":""}${det}`);
        }else sentences.push("No hizo popó en el período.");
      }
    }else sentences.push("No hay registros de popó aún.");

    // Bath
    if(rs.baths>0)sentences.push(`Se bañó ${rs.baths} vez${rs.baths!==1?"es":""}.`);
    else if(rangeId!=="24h")sentences.push("Sin baños registrados en el período.");

    return{baby,prose:sentences.join(" ")};
  });
  return{header,analyses};
}

function calendar(baby,since,rangeId){
  const useWeeks=rangeId==="30d"||rangeId==="all";
  if(useWeeks){
    const cols=Array.from({length:4}).map((_,wi)=>{
      const ws=new Date();ws.setDate(ws.getDate()-(3-wi+1)*7);ws.setHours(0,0,0,0);
      const we=new Date();we.setDate(we.getDate()-(3-wi)*7);we.setHours(0,0,0,0);
      const fc=S.events.filter(e=>e.babyId===baby.id&&e.type==="feed"&&new Date(e.dateTime)>=ws&&new Date(e.dateTime)<we).length;
      const hp=S.events.some(e=>e.babyId===baby.id&&e.type==="poop"&&new Date(e.dateTime)>=ws&&new Date(e.dateTime)<we);
      const hpe=S.events.some(e=>e.babyId===baby.id&&e.type==="pee"&&new Date(e.dateTime)>=ws&&new Date(e.dateTime)<we);
      const hb=S.events.some(e=>e.babyId===baby.id&&e.type==="bath"&&new Date(e.dateTime)>=ws&&new Date(e.dateTime)<we);
      const bH=Math.max(4,Math.min(40,fc*5));
      return`<div style="flex:1;text-align:center;min-width:0">
        <div style="position:relative;height:44px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:2px">
          <div style="width:70%;height:${bH}px;background:${fc>0?baby.color+"cc":"#1A1A2E"};border-radius:3px;position:relative">
            ${fc>0?`<span style="position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:8px;color:${baby.color};font-weight:800">${fc}</span>`:""}
          </div>
        </div>
        <div style="font-size:9px;color:#555">S${wi+1}</div>
        <div style="font-size:8px;margin-top:1px">${hp?"💩":""}${hpe?"💧":""}${hb?"🛁":""}</div>
      </div>`;
    }).join("");
    return`<div style="display:flex;gap:4px;align-items:flex-end">${cols}</div><div style="font-size:9px;color:#333;margin-top:3px">S1–S4 = últimas 4 semanas · nro = tomas</div>`;
  }
  const n=rangeId==="7d"?7:14;
  const cols=Array.from({length:n}).map((_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(n-1-i));d.setHours(0,0,0,0);
    const nx=new Date(d);nx.setDate(nx.getDate()+1);
    const fc=S.events.filter(e=>e.babyId===baby.id&&e.type==="feed"&&new Date(e.dateTime)>=d&&new Date(e.dateTime)<nx).length;
    const hp=S.events.some(e=>e.babyId===baby.id&&e.type==="poop"&&new Date(e.dateTime)>=d&&new Date(e.dateTime)<nx);
    const hpe=S.events.some(e=>e.babyId===baby.id&&e.type==="pee"&&new Date(e.dateTime)>=d&&new Date(e.dateTime)<nx);
    const hb=S.events.some(e=>e.babyId===baby.id&&e.type==="bath"&&new Date(e.dateTime)>=d&&new Date(e.dateTime)<nx);
    const bH=Math.max(4,Math.min(40,fc*7));
    return`<div style="flex:1;text-align:center;min-width:0">
      <div style="position:relative;height:44px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:2px">
        <div style="width:100%;max-width:22px;height:${bH}px;background:${fc>0?baby.color+"cc":"#1A1A2E"};border-radius:3px;position:relative">
          ${fc>0?`<span style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:7px;color:${baby.color};font-weight:800">${fc}</span>`:""}
        </div>
      </div>
      <div style="font-size:7px;color:#444">${d.toLocaleDateString("es-AR",{weekday:"narrow"})}</div>
      <div style="font-size:8px;margin-top:1px">${hp?"💩":""}${hpe?"💧":""}${hb?"🛁":""}</div>
    </div>`;
  }).join("");
  return`<div style="display:flex;gap:2px;align-items:flex-end">${cols}</div><div style="font-size:9px;color:#333;margin-top:3px">nro = tomas por día · 💩💧🛁 = eventos</div>`;
}

// ═══ EXTRACTION TAB ═══════════════════════════════════════════════════════════
function extraction(){
  const exts=[...S.events.filter(e=>e.type==="extraction")].sort(byDate);
  const lastExt=exts[0]||null;
  const lastBreast=[...S.events.filter(e=>e.type==="feed"&&e.subtype==="breast")].sort(byDate)[0]||null;
  const lastBreastBaby=lastBreast?BABIES.find(b=>b.id===lastBreast.babyId):null;

  // Extraction + breast hours
  const extH=lastExt?(Date.now()-new Date(lastExt.dateTime))/36e5:null;
  const breastH=lastBreast?(Date.now()-new Date(lastBreast.dateTime))/36e5:null;
  const bothHigh=extH!==null&&breastH!==null&&extH>3&&breastH>3;
  const bothVeryHigh=extH!==null&&breastH!==null&&extH>6&&breastH>6;
  const bannerColor=bothVeryHigh?"#EF5350":bothHigh?"#FFB74D":"#F48FB1";

  const banner=`<div style="background:${bannerColor}18;border:1px solid ${bannerColor}40;border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:12px">
    <div style="flex:1;text-align:center">
      <div style="font-size:10px;color:${bannerColor};font-weight:800;letter-spacing:.5px;margin-bottom:4px">ÚLTIMA EXTRACCIÓN</div>
      <div style="font-size:15px;font-weight:900;color:#fff">${extH!==null?ago(lastExt.dateTime):"Nunca"}</div>
      ${lastExt&&lastExt.ml?`<div style="font-size:10px;color:${bannerColor};margin-top:2px">${lastExt.ml}ml</div>`:""}
    </div>
    <div style="width:1px;background:${bannerColor}20"></div>
    <div style="flex:1;text-align:center">
      <div style="font-size:10px;color:${bannerColor};font-weight:800;letter-spacing:.5px;margin-bottom:4px">ÚLTIMA SUCCIÓN</div>
      <div style="font-size:15px;font-weight:900;color:#fff">${breastH!==null?ago(lastBreast.dateTime):"Nunca"}</div>
      ${lastBreastBaby?`<div style="font-size:10px;color:${lastBreastBaby.color};margin-top:2px">${lastBreastBaby.emoji} ${lastBreastBaby.name}</div>`:""}
    </div>
  </div>`;

  // Extraction analysis
  let analysisTxt="";
  if(exts.length>=2){
    const mlArr=exts.filter(e=>e.ml).map(e=>e.ml);
    const avgMl=mlArr.length?Math.round(mlArr.reduce((a,b)=>a+b)/mlArr.length):null;
    // intervals between extractions (hours)
    const itvs=[];for(let i=1;i<exts.length;i++)itvs.push((new Date(exts[i-1].dateTime)-new Date(exts[i].dateTime))/36e5);
    const avgItv=itvs.length?Math.round(itvs.reduce((a,b)=>a+b)/itvs.length*10)/10:null;
    // trend: compare last 3 vs rest
    let trendTxt="";
    if(exts.length>=4&&mlArr.length>=4){
      const recent=mlArr.slice(0,Math.ceil(mlArr.length/2)).reduce((a,b)=>a+b)/Math.ceil(mlArr.length/2);
      const older=mlArr.slice(Math.ceil(mlArr.length/2)).reduce((a,b)=>a+b)/(mlArr.length-Math.ceil(mlArr.length/2));
      if(recent>older*1.2)trendTxt=" La producción viene en aumento en los últimos registros.";
      else if(recent<older*0.8)trendTxt=" Se nota una baja en la producción respecto a registros anteriores.";
      else trendTxt=" La producción se mantiene estable.";
    }
    const parts=[];
    if(avgMl)parts.push(`Promedio por extracción: ${avgMl}ml.`);
    if(avgItv)parts.push(`Frecuencia promedio: cada ${avgItv}h.`);
    analysisTxt=parts.join(" ")+trendTxt;
  }else if(exts.length===1){
    analysisTxt="Solo hay un registro de extracción aún. Agregá más para ver tendencias.";
  }else{
    analysisTxt="Sin extracciones registradas todavía.";
  }

  const analysisBox=`<div style="background:#1A1A2E;border:1px solid #F48FB130;border-radius:12px;padding:12px;margin-bottom:14px">
    <div style="font-size:10px;color:#F48FB1;font-weight:800;letter-spacing:.5px;margin-bottom:6px">ANÁLISIS</div>
    <div style="font-size:13px;color:#bbb;line-height:1.65">${esc(analysisTxt)}</div>
  </div>`;

  const rows=exts.map(ev=>`
    <div class="ev-row" data-id="${ev.id}">
      <span style="font-size:21px;width:34px;height:34px;background:#F48FB115;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">🪣</span>
      <div style="flex:1">
        <div style="font-size:13px;color:#F48FB1;font-weight:700">Extracción${ev.ml?" · "+ev.ml+"ml":""}</div>
        ${ev.notes?`<div style="font-size:11px;color:#555;margin-top:1px">${esc(ev.notes)}</div>`:""}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:12px;color:#888">${fmtTime(ev.dateTime)}</div>
        <div style="font-size:10px;color:#444">${fmtDate(ev.dateTime)}</div>
      </div>
      <button class="btn-del" data-id="${ev.id}" onclick="event.stopPropagation()" style="background:#EF535018;border:1px solid #EF535030;border-radius:8px;padding:6px 8px;cursor:pointer;font-size:12px;color:#EF5350;flex-shrink:0">🗑️</button>
    </div>`).join("");

  return`
    <button id="btn-add-ext" style="width:100%;padding:14px;border-radius:14px;background:#F48FB120;border:1.5px solid #F48FB150;color:#F48FB1;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px">
      + Nueva extracción
    </button>
    ${banner}${analysisBox}
    <div style="font-size:10px;color:#333;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Historial</div>
    ${rows||`<div style="text-align:center;color:#444;padding:32px 0;font-size:13px">Sin extracciones</div>`}`;
}

    <div class="conf-bx">
      <div style="font-size:36px;margin-bottom:12px">🗑️</div>
      <div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:8px">¿Borrar registro?</div>
      <div style="font-size:13px;color:#666;margin-bottom:4px">Esta acción no se puede deshacer.</div>
      <div style="font-size:12px;color:#EF5350;font-weight:700;margin-bottom:20px">Confirmá que querés eliminarlo.</div>
      <div style="display:flex;gap:8px">
        <button id="btn-cancel-del" style="flex:1;padding:12px;border-radius:12px;background:#0D0D1A;border:1px solid #2A2A3E;color:#666;font-size:14px;font-weight:700;cursor:pointer">Cancelar</button>
        <button id="btn-confirm-del" style="flex:1;padding:12px;border-radius:12px;background:#EF535030;border:1px solid #EF535060;color:#EF5350;font-size:14px;font-weight:700;cursor:pointer">Borrar</button>
      </div>
    </div>
  </div>`;
}

// ═══ BIND ═════════════════════════════════════════════════════════════════════
function bind(){
  const $=id=>document.getElementById(id);
  $("btn-ver-todo")?.addEventListener("click",()=>{S.activeTab="log";render();});
  $("btn-add-ext")?.addEventListener("click",()=>openModal(null,"extraction"));
  document.querySelectorAll(".btn-tab").forEach(b=>b.addEventListener("click",()=>{S.activeTab=b.dataset.tab;render();}));
  document.querySelectorAll(".fbaby").forEach(b=>b.addEventListener("click",()=>{S.filterBaby=b.dataset.f;render();}));
  document.querySelectorAll(".ftype").forEach(b=>b.addEventListener("click",()=>{S.filterType=b.dataset.f;render();}));
  document.querySelectorAll(".btn-range").forEach(b=>b.addEventListener("click",()=>{S.statsRange=b.dataset.range;render();}));
  document.querySelectorAll(".ev-row").forEach(row=>{
    row.addEventListener("click",e=>{
      if(e.target.closest(".btn-del"))return;
      const id=parseInt(row.dataset.id);if(!isNaN(id)){S.detailId=id;render();}
    });
  });
  document.querySelectorAll(".btn-del").forEach(b=>b.addEventListener("click",()=>{
    S.confirmDel=parseInt(b.dataset.id);S.detailId=null;render();
  }));
  $("btn-confirm-del")?.addEventListener("click",()=>{
    const id=S.confirmDel;
    deletedToast(id);
    deleteEvent(id);S.confirmDel=null;render();
  });
  $("btn-cancel-del")?.addEventListener("click",()=>{S.confirmDel=null;render();});
  $("conf-bd")?.addEventListener("click",e=>{if(e.target===$("conf-bd")){S.confirmDel=null;render();}});
  $("btn-det-close")?.addEventListener("click",()=>{S.detailId=null;render();});
  $("det-bd")?.addEventListener("click",e=>{if(e.target===$("det-bd")){S.detailId=null;render();}});

  if(!S.modal)return;
  $("btn-modal-back")?.addEventListener("click",()=>{S.modal=null;render();});
  $("modal-bd")?.addEventListener("click",e=>{if(e.target===$("modal-bd")){S.modal=null;render();}});
  document.querySelectorAll(".m-baby").forEach(b=>b.addEventListener("click",()=>{MS.babyId=b.dataset.baby;render();}));
  document.querySelectorAll(".m-type").forEach(b=>b.addEventListener("click",()=>{MS.type=b.dataset.t;ME={};render();}));
  document.querySelectorAll(".m-sub").forEach(b=>b.addEventListener("click",()=>{MS.subtype=b.dataset.s;ME={};
    // Update default ml based on subtype
    if(b.dataset.s==="pumped"||b.dataset.s==="formula")MS.ml=MS.ml||"150";
    if(b.dataset.s==="breast")MS.durationMin=MS.durationMin||"10";
    render();
  }));
  document.querySelectorAll(".m-ml").forEach(b=>b.addEventListener("click",()=>{MS.ml=b.dataset.v;ME.ml=false;render();}));
  document.querySelectorAll(".m-dur").forEach(b=>b.addEventListener("click",()=>{MS.durationMin=b.dataset.v;ME.dur=false;render();}));
  document.querySelectorAll(".m-cons").forEach(b=>b.addEventListener("click",()=>{MS.consistency=b.dataset.c;render();}));
  document.querySelectorAll(".m-pcol").forEach(b=>b.addEventListener("click",()=>{MS.poopColor=b.dataset.c;render();}));
  document.querySelectorAll(".m-oth").forEach(b=>b.addEventListener("click",()=>{MS.otherSubtype=b.dataset.s;render();}));
  $("m-ml-i")?.addEventListener("input",e=>{MS.ml=e.target.value;ME.ml=false;});
  $("m-dur-i")?.addEventListener("input",e=>{MS.durationMin=e.target.value;ME.dur=false;});
  $("m-dt")?.addEventListener("change",e=>{MS.dateTime=e.target.value;});
  $("m-notes")?.addEventListener("input",e=>{MS.notes=e.target.value;});
  $("btn-now")?.addEventListener("click",()=>{MS.dateTime=toInput(new Date().toISOString());const d=$("m-dt");if(d)d.value=MS.dateTime;});

  $("btn-save")?.addEventListener("click",()=>{
    const dtEl=$("m-dt"),nEl=$("m-notes"),mlEl=$("m-ml-i"),dEl=$("m-dur-i");
    if(dtEl)MS.dateTime=dtEl.value;if(nEl)MS.notes=nEl.value;
    if(mlEl&&mlEl.value)MS.ml=mlEl.value;if(dEl&&dEl.value)MS.durationMin=dEl.value;
    // No hard validation – all fields optional now
    ME={};
    const ev={
      id:Date.now(),dateTime:new Date(MS.dateTime).toISOString(),notes:MS.notes,type:MS.type,
      ...(MS.type!=="extraction"&&{babyId:MS.babyId}),
      ...(MS.type==="feed"&&{
        subtype:MS.subtype,
        ml:(MS.subtype==="pumped"||MS.subtype==="formula")&&MS.ml?parseInt(MS.ml):null,
        durationMin:MS.subtype==="breast"&&MS.durationMin?parseInt(MS.durationMin):null,
      }),
      ...(MS.type==="extraction"&&{ml:MS.ml?parseInt(MS.ml):null}),
      ...(MS.type==="poop"&&{consistency:MS.consistency,poopColor:MS.poopColor}),
      ...(MS.type==="other"&&{otherSubtype:MS.otherSubtype}),
    };
    addEvent(ev);S.modal=null;render();
    savedToast(ev);
  });
}

// ═══ INIT ═════════════════════════════════════════════════════════════════════
S.events=loadLocal();
render();
</script>
</body>
</html>
